services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        environment:
            - DB_HOST=postgres
            - DOCKER_COMPOSE_ENABLED=false
            - LOG_DIR=/logs
        ports:
            - "8080:8080"
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./logs:/logs
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "3000:80"
        depends_on:
            app:
                condition: service_started
    postgres:
        image: "postgres:16"
        environment:
            - "POSTGRES_DB=${DB_NAME}"
            - "POSTGRES_PASSWORD=${DB_PASSWORD}"
            - "POSTGRES_USER=${DB_USER}"
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres-data:
