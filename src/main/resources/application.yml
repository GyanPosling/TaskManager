spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: taskmanager
  datasource:
    url: jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:taskManagerDb}}
    username: ${DB_USER:${PGUSER:postgres}}
    password: ${DB_PASSWORD:${PGPASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:false}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${PORT:8080}
