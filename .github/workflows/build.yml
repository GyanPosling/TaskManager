name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: taskManagerDb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d taskManagerDb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: taskManagerDb
      DB_USER: postgres
      DB_PASSWORD: postgres
      DOCKER_COMPOSE_ENABLED: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build (without tests)
        run: sh mvnw -B -DskipTests package

      - name: Run tests
        run: sh mvnw -B test

      - name: SonarQube analysis
        if: ${{ github.event_name != 'pull_request' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "SONAR_TOKEN is not set. Skipping SonarQube analysis."
            exit 0
          fi
          sh mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=GyanPosling_TaskManager

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
        run: |
          RAILWAY_TOKEN="$(printf '%s' "${RAILWAY_TOKEN}" | tr -d '\r\n' | xargs)"
          RAILWAY_SERVICE_ID="$(printf '%s' "${RAILWAY_SERVICE_ID}" | tr -d '\r\n' | xargs)"
          RAILWAY_ENVIRONMENT_ID="$(printf '%s' "${RAILWAY_ENVIRONMENT_ID}" | tr -d '\r\n' | xargs)"

          if [ -z "${RAILWAY_TOKEN}" ] || [ -z "${RAILWAY_SERVICE_ID}" ] || [ -z "${RAILWAY_ENVIRONMENT_ID}" ]; then
            echo "Missing required GitHub config."
            echo "Required: secret RAILWAY_TOKEN; vars RAILWAY_SERVICE_ID and RAILWAY_ENVIRONMENT_ID"
            exit 1
          fi

          railway up --service "${RAILWAY_SERVICE_ID}" --environment "${RAILWAY_ENVIRONMENT_ID}" --detach

  healthcheck:
    name: Post-deploy Healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Check deployed app health
      
        env:
          APP_HEALTHCHECK_URL: ${{ vars.APP_HEALTHCHECK_URL }}
        run: |
          APP_HEALTHCHECK_URL="$(printf '%s' "${APP_HEALTHCHECK_URL}" | tr -d '\r\n' | xargs)"

          if [ -z "${APP_HEALTHCHECK_URL}" ]; then
            echo "Missing required GitHub variable APP_HEALTHCHECK_URL"
            exit 1
          fi

          echo "Healthcheck URL: ${APP_HEALTHCHECK_URL}"

          for attempt in {1..30}; do
            http_code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "${APP_HEALTHCHECK_URL}" || true)
            if [ "${http_code}" = "200" ] && grep -q '"status":"UP"' /tmp/health.json; then
              echo "Healthcheck passed on attempt ${attempt}"
              cat /tmp/health.json
              exit 0
            fi

            echo "Attempt ${attempt}/30 failed (HTTP ${http_code}). Retrying in 10s..."
            sleep 10
          done

          echo "Healthcheck failed after all retries. Last response:"
          cat /tmp/health.json || true
          exit 1
